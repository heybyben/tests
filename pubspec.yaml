name: music_app
description: A music player app with Jellyfin & Navidrome support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  cached_network_image: ^3.3.1
  dio: ^5.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  palette_generator: ^0.3.3+2
  flutter_slider_drawer: ^2.1.2
  percent_indicator: ^4.2.3
  rxdart: ^0.27.7
  lottie: ^3.0.0
  google_fonts: ^6.1.0
  iconsax: ^0.0.8
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
